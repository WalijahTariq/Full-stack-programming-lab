<!DOCTYPE html>
<html>
<head>
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Student Management System</h1>

  <div class="form-section">
    <input type="number" id="stuId" placeholder="ID">
    <input type="text" id="stuName" placeholder="Name">
    <input type="number" id="stuSemester" placeholder="Semester">
    <input type="text" id="stuCourses" placeholder="Courses (comma separated)">
    <button id="addStudentBtn">Add Student</button>
  </div>

  <div id="students"></div>

<script src="script.js"></script>
</body>
</html>
