<!DOCTYPE html>
<html>
<head>
  <title>Mini University Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mini University Portal</h1>

<div class="form-section">
  <h2>Add Student</h2>
  <input type="number" id="studentId" placeholder="Student ID">
  <input type="text" id="studentName" placeholder="Student Name">
  <button id="addStudentBtn">Add Student</button>
</div>

<div class="form-section">
  <h2>Register Course</h2>
  <input type="number" id="courseStudentId" placeholder="Student ID">
  <input type="text" id="courseName" placeholder="Course Name">
  <button id="addCourseBtn">Register Course</button>
</div>

<button id="saveBtn">Save Data</button>

<div id="portal"></div>

<script src="script.js"></script>
</body>
</html>
